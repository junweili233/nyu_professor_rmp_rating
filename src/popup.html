<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NYU RMP</title>
    <script type="module" src="./popup.js"></script>
    <style>
      :root {
        color: #172033;
        font-family: Aptos, "Segoe UI", sans-serif;
      }
      body {
        background: #f6f7fb;
        margin: 0;
        width: 320px;
      }
      main {
        display: grid;
        gap: 14px;
        padding: 18px;
      }
      h1 {
        font-size: 18px;
        letter-spacing: 0;
        line-height: 1.1;
        margin: 0;
      }
      p {
        color: #526073;
        font-size: 13px;
        line-height: 1.5;
        margin: 0;
      }
      .panel {
        background: #ffffff;
        border: 1px solid #dde3ec;
        border-radius: 8px;
        box-shadow: 0 18px 45px rgba(24, 35, 54, 0.08);
        padding: 14px;
      }
      .status {
        align-items: center;
        display: flex;
        gap: 8px;
      }
      .dot {
        background: #1f8a5b;
        border-radius: 999px;
        height: 8px;
        width: 8px;
      }
      button {
        background: #172033;
        border: 0;
        border-radius: 7px;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        margin-top: 12px;
        padding: 8px 10px;
        transition: opacity 160ms ease, transform 160ms ease;
      }
      button:active {
        transform: translateY(1px);
      }
      button:disabled {
        cursor: default;
        opacity: 0.45;
      }
      .toggle-row {
        align-items: center;
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .toggle-row span {
        color: #172033;
        font-size: 13px;
        font-weight: 700;
      }
      input[type="checkbox"] {
        accent-color: #172033;
        height: 18px;
        width: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>NYU Albert RMP</h1>
        <p>Ratings appear next to instructor rows on Albert after the page settles.</p>
      </section>
      <section class="panel">
        <label class="toggle-row">
          <span>Show ratings on Albert</span>
          <input id="enable-overlay" type="checkbox" />
        </label>
        <div class="status">
          <span class="dot"></span>
          <p id="status">Extension ready</p>
        </div>
        <button id="clear-cache" type="button">Clear cached ratings</button>
      </section>
    </main>
  </body>
</html>
